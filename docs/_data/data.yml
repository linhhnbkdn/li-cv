experiences:
  title: Experiences
  info:
  - role: Technical Lead / Principal Software Engineer
    time: Jan 2022 – Present
    company: Money Forward Vietnam — Fintech, headquartered in Japan
    details: |
      - Owned production reliability across AWS and Kubernetes — monitoring, capacity planning, and incident response.
      - Architected and shipped new microservices end-to-end, including service code and AWS/Kubernetes infrastructure-as-code.
      - Established repository structure, coding standards, and design-pattern guidelines for the team.
      - Built and operated CI/CD pipelines spanning development, staging, and production.
      - Partnered with Product Managers and Owners to translate business requirements into technical solutions.
      - Mentored engineers on new technologies and led code reviews to raise team-wide quality.
      - Led Agile ceremonies — sprint planning, retrospectives, and daily stand-ups.

  - role: Backend Engineer
    time: Sep 2021 – Jan 2022
    company: Parcel Perform Tech Hub Vietnam — E-commerce data & delivery platform
    details: |
      - Designed and shipped authentication and notification microservices on JWT and OAuth2.
      - Built async task pipelines on Kafka (message broker) and Celery (workers) for high-throughput workloads.
      - Tuned services for availability and performance in close collaboration with the platform team.
      - Drove daily stand-ups and sprint planning in an Agile environment.

  - role: Backend Engineer
    time: Mar 2019 – Sep 2021
    company: Ampere Computing Vietnam — American fabless semiconductor company
    details: |
      - Developed backend services for hardware test automation and log analytics.
      - Built and trained SVM classifiers for object-classification workflows.
      - Optimized backend systems in collaboration with cross-functional teams.
      - Contributed to code reviews, bug fixing, and feature enhancements.

  - role: Full-stack Engineer
    time: Jan 2016 – Mar 2019
    company: Quang Trung Software City — Software & emerging-tech research for global clients
    details: |
      - Researched IoT tech stacks for client-facing product prototypes.
      - Designed and implemented web applications together with embedded-device firmware.
      - Demoed products directly to customers and incorporated iteration feedback.


