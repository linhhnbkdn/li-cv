career-profile:
  title: Career Profile
  summary: |
    Principal Software Engineer with **8+ years** designing and scaling
    backend systems on AWS and Kubernetes — originally trained in
    mechatronics, now specialized in backend, cloud, and AI engineering.
    Currently leading platform and AI engineering at Money Forward
    Vietnam: architected an internal **AI Agent platform** (LangChain,
    RAG, Function Calling, FastAPI) and scaled invoice-processing
    services to **10k concurrent users / 3k transactions per day** with
    KEDA-driven autoscaling on EKS.

    Strengths: pragmatic architecture, mentorship, and shipping
    production systems with measurable impact.

    Recipient of **MVP — Most Valuable Performer Award (Q1/2025, 2023)** and
    **MVT — Most Valuable Team Award (2023)** at Money Forward Vietnam.


