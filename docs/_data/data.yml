career-profile:
  title: Career Profile
  summary: |
    Principal Software Engineer scaling fintech platforms at **10k CCU and 3k tx/day**
    on AWS/EKS. Built and lead Money Forward Vietnam's **AI Agent platform**
    (LangChain, RAG, Function Calling) and a 10-engineer team across backend, cloud,
    and GenAI. **Three-time award winner** (MVP Q1/2025, MVP 2023, MVT 2023) for
    scaling AI infrastructure and cutting P1 incident MTTR to under 30 minutes through
    centralized observability.


