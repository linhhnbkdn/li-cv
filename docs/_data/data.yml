projects:
  title: Projects
  intro: >
    Selected production systems built or led across fintech AI, invoice
    automation, logistics, semiconductor tooling, and IoT.
  assignments:
  - title: AI Agent Platform (Money Forward)
    link:
    tagline: "Internal Generative-AI platform — shared protocol and plug-and-play deployment for production AI Agents. RAG over enterprise data, structured Function Calling, async orchestration. Stack: LangChain, Claude API, FastAPI, Celery, Pydantic, EKS, Terraform, KEDA, AWS KMS. Team of 10 — Principal Software Engineer."

  - title: Cloud Invoice Platform (Money Forward)
    link:
    tagline: "Two-product cloud platform — invoice receiving (OCR, reconciliation) and invoice sending (compose, deliver, track). Scale: 10k CCU / 3k tx/day (receiving), 5k CCU / 2k tx/day (sending). Django, DRF, Graphene-Django GraphQL, Celery on EKS with KEDA autoscaling; PostgreSQL, MySQL, Redis, ELK."

  - title: PP Core System (Parcel Perform)
    link:
    tagline: "Core logistics platform — parcel tracking, notifications, distance/route optimization at ~1M writes/day. JWT/OAuth2, Kafka, FastAPI, Celery."

  - title: Avion (Ampere Computing)
    link:
    tagline: "Internal hardware-test runner with log storage, search, and statistics for chip validation. Monolithic MVC on Django + Flask + Docker Compose."

  - title: IoT Ampere (Quang Trung Software City)
    link:
    tagline: "Arduino-based real-time current monitoring system streaming sensor data to a Django web dashboard for online visualization."


