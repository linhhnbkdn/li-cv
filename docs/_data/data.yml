career-profile:
  title: Career Profile
  summary: |
    Technical Lead / Principal Software Engineer with **8+ years** building
    backend systems, microservices, and cloud-native platforms on AWS and
    Kubernetes. Production experience scaling fintech workloads to 10k
    concurrent users with Django, Celery, KEDA, and event-driven
    architectures — paired with hands-on work in AI/ML (Generative AI,
    LangChain, RAG, Computer Vision) and big-data pipelines (PySpark,
    Airflow).

    Recipient of **MVP — Most Valuable Personal Award (Q1/2025, 2023)** and
    **MVT — Most Valuable Team Award (2023)** at Money Forward Vietnam,
    recognizing exceptional technical delivery and cross-functional
    collaboration.

    Seeking engineering challenges where systems thinking, mentorship, and
    pragmatic architecture compound.


