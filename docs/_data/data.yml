projects:
  title: Projects
  intro: >
    Selected production systems built or led across fintech, logistics,
    semiconductor tooling, and IoT.
  assignments:
  - title: AI Agent Platform (Money Forward)
    link:
    tagline: "Plug-and-play AI Agent platform with shared protocol. Stack: FastAPI, Celery, Gin, EKS, Terraform, KEDA, AWS KMS. Team of 10 — Technical Lead."

  - title: Received Cloud Invoice (Money Forward)
    link:
    tagline: "Invoice receiving and OCR processing — 10k concurrent users, 3k transactions/day on EKS with KEDA-driven autoscaling. Django + Celery + DRF."

  - title: Web Sending Invoice (Money Forward)
    link:
    tagline: "Invoice sending and reconciliation — 5k concurrent users, 2k transactions/day. GraphQL via Graphene-Django + Django REST Framework."

  - title: PP Core System (Parcel Perform)
    link:
    tagline: "Core logistics platform — parcel tracking, notifications, distance/route optimization at ~1M writes/day. JWT/OAuth2, Kafka, FastAPI, Celery."

  - title: Avion (Ampere Computing)
    link:
    tagline: "Internal hardware-test runner with log storage, search, and statistics. Monolithic MVC on Django + Flask + Docker Compose."

  - title: IoT Ampere (Quang Trung Software City)
    link:
    tagline: "Arduino-based real-time current monitoring system streaming sensor data to a Django web dashboard for online visualization."


